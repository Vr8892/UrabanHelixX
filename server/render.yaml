services:
  - type: web
    name: urbanhelix-api
    env: node
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false          # fill in MongoDB Atlas URI on Render dashboard
      - key: JWT_SECRET
        sync: false          # fill in a strong secret on Render dashboard
      - key: CLIENT_URL
        sync: false          # fill in your Vercel URL e.g. https://urbanhelix.vercel.app
